<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Performative Presence Survivorship Bias</title>
  <desc id="desc">A comparison of visible reply sample and full exposure sample in advisor group chats.</desc>
  <defs>
    <style>
      .bg { fill: #f7f0e5; }
      .panel { fill: #fffaf1; stroke: #1e1e1e; stroke-width: 3; rx: 26; ry: 26; }
      .box { fill: #f1e1c8; stroke: #1e1e1e; stroke-width: 2.4; rx: 18; ry: 18; }
      .ghost { fill: #ded4c2; stroke: #6c6c6c; stroke-width: 2; stroke-dasharray: 8 8; rx: 18; ry: 18; opacity: 0.95; }
      .label { font-family: "Georgia", "Times New Roman", serif; fill: #111; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 20px; }
      .body { font-size: 18px; }
      .small { font-size: 16px; }
      .metric { font-size: 26px; font-weight: 700; }
      .arrow { stroke: #8a2f2b; stroke-width: 6; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8a2f2b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="600" y="62" text-anchor="middle" class="label title">Performative Presence Survivorship Bias / 体面在场幸存者偏差</text>
  <text x="600" y="96" text-anchor="middle" class="label subtitle">Only the publicly alive get counted as the norm.</text>

  <rect class="panel" x="60" y="130" width="480" height="520"/>
  <text x="300" y="175" text-anchor="middle" class="label title">Visible Reply Sample</text>
  <text x="300" y="205" text-anchor="middle" class="label body">What the lab thinks "normal responsiveness" looks like</text>

  <rect class="box" x="110" y="245" width="340" height="82"/>
  <text x="280" y="280" text-anchor="middle" class="label body">Public, timely, decorous replies</text>
  <text x="280" y="308" text-anchor="middle" class="label small">"Received, professor" / "收到老师"</text>

  <rect class="box" x="110" y="355" width="340" height="82"/>
  <text x="280" y="390" text-anchor="middle" class="label body">Window inferred as normal</text>
  <text x="280" y="418" text-anchor="middle" class="label metric">6-12 min</text>

  <rect class="box" x="110" y="465" width="340" height="112"/>
  <text x="280" y="500" text-anchor="middle" class="label body">Institutional fantasy produced</text>
  <text x="280" y="532" text-anchor="middle" class="label small">everyone is alert</text>
  <text x="280" y="558" text-anchor="middle" class="label small">everyone is emotionally available</text>

  <rect class="panel" x="660" y="130" width="480" height="520"/>
  <text x="900" y="175" text-anchor="middle" class="label title">Full Exposure Sample</text>
  <text x="900" y="205" text-anchor="middle" class="label body">What the chat actually has to absorb</text>

  <rect class="box" x="720" y="238" width="360" height="68"/>
  <text x="900" y="280" text-anchor="middle" class="label body">public replies</text>

  <rect class="ghost" x="720" y="324" width="360" height="68"/>
  <text x="900" y="366" text-anchor="middle" class="label body">delayed or delegated replies</text>

  <rect class="ghost" x="720" y="410" width="360" height="68"/>
  <text x="900" y="452" text-anchor="middle" class="label body">private handoffs and side-channel repair</text>

  <rect class="ghost" x="720" y="496" width="360" height="68"/>
  <text x="900" y="538" text-anchor="middle" class="label body">strategic silence and public non-appearance</text>

  <rect class="box" x="760" y="586" width="280" height="58"/>
  <text x="900" y="624" text-anchor="middle" class="label metric">8-19 min</text>

  <path class="arrow" d="M545 360 C615 360, 625 360, 655 360" marker-end="url(#arrowhead)"/>
  <text x="600" y="332" text-anchor="middle" class="label metric" fill="#8a2f2b">Bias = visible order - lived order</text>
  <text x="600" y="384" text-anchor="middle" class="label body" fill="#8a2f2b">Normality looks earlier, cleaner, and more obedient than it is.</text>

  <text x="300" y="692" text-anchor="middle" class="label small">Visible sample overstates stable responsiveness.</text>
  <text x="900" y="692" text-anchor="middle" class="label small">Full sample restores delay, delegation, and disappearance.</text>
</svg>
