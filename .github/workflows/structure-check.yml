name: structure-check

on:
  push:
  pull_request:

jobs:
  status-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run structure check
        run: python scripts/status_report.py

      - name: Compile helper scripts
        run: python -m py_compile scripts/new_phase.py scripts/new_xhs_post.py scripts/status_report.py
